# Minimal Alertmanager config routing all alerts to forager-sre.
route:
  receiver: forager
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: forager
    webhook_configs:
      - url: http://forager:8080/webhook/alertmanager
        send_resolved: true   # forager skips resolved alerts itself
